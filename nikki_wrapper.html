<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日記・ジャーナリング AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #fafafa; }

    /* ── ヘッダー ── */
    #header {
      height: 44px;
      background: #4a86e8;
      display: flex;
      align-items: center;
      padding: 0 14px;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
    }
    #header span {
      color: #fff;
      font-family: sans-serif;
      font-size: 15px;
      font-weight: bold;
    }

    /* ── iframe ── */
    iframe {
      position: fixed;
      top: 44px; left: 0;
      width: 100%;
      height: calc(100% - 44px);
      border: none;
    }
  </style>
</head>
<body>

  <div id="header">
    <span>📝 日記・ジャーナリング AI</span>
  </div>

  <!--
    ↓↓↓ GASのデプロイURLをここに貼り付けてください ↓↓↓
    「新しいデプロイ」で発行したURLの末尾が /exec になっているものです。
  -->
  <iframe
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbzLy4pZb4f2wyOLzic-Mbm-58WLuIqbLc7j3GSxD7mJp9VShG7yWjo10TiznfzlnlFJYg/exec"
    allow="clipboard-read; clipboard-write">
  </iframe>

</body>
</html>
