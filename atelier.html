<!DOCTYPE html>
<html lang="ja">
<head>

<meta name="description" content="締め切りのない夜に、生まれたものたち。一ノ瀬ゆしろうの作品ギャラリー。">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="The Atelier · 一ノ瀬ゆしろう">
<meta name="twitter:description" content="締め切りのない夜に、生まれたものたち。">
<meta name="twitter:image" content="https://atelier-e1661.web.app/card-front.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2316151C'/%3E%3Crect x='16' y='16' width='32' height='32' fill='none' stroke='%23B08D57' stroke-width='4'/%3E%3Ccircle cx='20' cy='20' r='2.5' fill='%23B08D57'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --ink:#16151C;
    --ink-2:#1D1C24;
    --ink-3:#26242E;
    --plaster:#EAE3D6;
    --plaster-2:#DFD6C4;
    --brass:#B08D57;
    --brass-light:#D9B583;
    --verdigris:#5B8A82;
    --chalk:#F3EFE6;
    --charcoal:#2A2620;
    --danger:#B0685A;
    --line: rgba(234,227,214,0.14);
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  .atelier-root{
    font-family:'Inter',sans-serif;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(176,141,87,0.10), transparent),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(91,138,130,0.08), transparent),
      var(--ink);
    color:var(--chalk);
    min-height:100vh;
    padding-bottom:80px;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px;}

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:28px 0 20px;border-bottom:1px solid var(--line);
    margin-bottom:8px;
  }
  .wordmark{
    font-family:'Fraunces',serif;font-weight:600;font-size:22px;
    letter-spacing:0.01em;color:var(--chalk);cursor:pointer;
    display:flex;align-items:baseline;gap:8px;
  }
  .wordmark .dot{color:var(--brass);font-size:22px;line-height:0;}
  .nav-actions{display:flex;align-items:center;gap:18px;font-size:13px;}
  .nav-link{
    color:var(--plaster-2);text-decoration:none;cursor:pointer;
    font-family:'IBM Plex Mono',monospace;letter-spacing:0.03em;
    padding:8px 4px;border-bottom:1px solid transparent;transition:all .2s;
  }
  .nav-link:hover,.nav-link:focus-visible{color:var(--brass-light);border-bottom-color:var(--brass-light);outline:none;}
  .nav-link.active{color:var(--brass-light);border-bottom-color:var(--brass);}
  .avatar-chip{
    display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;
    color:var(--plaster-2);background:var(--ink-2);border:1px solid var(--line);
    padding:6px 12px 6px 6px;border-radius:999px;
  }
  .avatar-chip img{width:22px;height:22px;border-radius:50%;display:block;}
  .logout-btn{background:none;border:none;color:var(--brass-light);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:0;margin-left:4px;}

  /* ---------- Hero ---------- */
  .hero{padding:56px 0 40px;}
  .hero .eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.12em;
    color:var(--verdigris);text-transform:uppercase;margin-bottom:14px;
  }
  .hero h1{
    font-family:'Fraunces',serif;font-weight:600;font-size:clamp(36px,6vw,58px);
    line-height:1.05;margin:0 0 18px;letter-spacing:-0.01em;
  }
  .hero p{
    font-size:16px;line-height:1.7;color:var(--plaster-2);max-width:520px;margin:0;
  }

  /* ---------- Gallery grid ---------- */
  .gallery{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:28px;margin-top:32px;
  }
  .frame-outer{perspective:1400px;}
  .frame{
    border:1px solid var(--line);border-radius:2px;overflow:hidden;
    background:var(--ink-2);
    box-shadow:0 1px 0 rgba(255,255,255,0.03) inset, 0 18px 40px -22px rgba(0,0,0,0.6);
  }
  .art{
    height:168px;position:relative;
    display:flex;align-items:flex-end;padding:14px;
  }
  .art .tagline{
    font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--chalk);
    text-shadow:0 2px 12px rgba(0,0,0,0.5);
  }
  .status-dot{
    position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:50%;
    box-shadow:0 0 0 3px rgba(0,0,0,0.25);
  }
  .status-dot.public{background:var(--brass-light);}
  .status-dot.private{background:var(--verdigris);}

  .placard-wrap{perspective:900px;}
  .placard{
    position:relative;min-height:78px;transition:transform .55s cubic-bezier(.4,.2,.2,1);
    transform-style:preserve-3d;cursor:pointer;
  }
  .placard.flipped{transform:rotateX(180deg);}
  .placard-face{
    backface-visibility:hidden;padding:14px 16px;
  }
  .placard-front{position:relative;}
  .placard-back{
    position:absolute;inset:0;transform:rotateX(180deg);
    background:var(--ink-3);display:flex;flex-direction:column;justify-content:center;gap:8px;
  }
  .p-title{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin:0 0 4px;}
  .p-tag{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.06em;
    color:var(--brass-light);text-transform:uppercase;
  }
  .p-desc{font-size:13px;color:var(--plaster-2);line-height:1.6;margin:0;}
  .p-url{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--verdigris);
    word-break:break-all;
  }
  .open-btn{
    align-self:flex-start;margin-top:2px;
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.04em;
    color:var(--ink);background:var(--brass-light);border:none;
    padding:7px 14px;border-radius:999px;cursor:pointer;text-decoration:none;display:inline-block;
  }
  .open-btn:hover{background:var(--chalk);}
  .qr-btn{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.04em;
    color:var(--chalk);background:transparent;border:1px solid rgba(234,227,214,0.35);
    padding:7px 12px;border-radius:999px;cursor:pointer;
  }
  .qr-btn:hover{border-color:var(--brass-light);color:var(--brass-light);}
  .qr-modal{
    position:fixed;inset:0;background:rgba(10,9,13,0.80);display:flex;
    align-items:center;justify-content:center;z-index:100;padding:24px;
  }
  .qr-card{
    background:var(--chalk);border-radius:8px;padding:32px 28px 24px;
    text-align:center;max-width:300px;width:100%;
    box-shadow:0 32px 80px rgba(0,0,0,0.6);
  }
  .qr-card-title{
    font-family:'Fraunces',serif;font-size:18px;color:var(--ink);margin:0 0 6px;
  }
  .qr-card-url{
    font-family:'IBM Plex Mono',monospace;font-size:10px;color:#666;
    word-break:break-all;margin:0 0 20px;
  }
  #qrcode-holder{display:flex;justify-content:center;margin-bottom:20px;}
  #qrcode-holder canvas,#qrcode-holder img{border-radius:4px;}
  .qr-close{
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:#888;
    background:none;border:1px solid #ccc;border-radius:999px;
    padding:8px 20px;cursor:pointer;
  }
  .qr-close:hover{border-color:var(--ink);color:var(--ink);}
  .qr-dl{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink);
    background:var(--plaster-2);border:none;border-radius:999px;
    padding:8px 18px;cursor:pointer;margin-right:8px;
  }
  .qr-dl:hover{background:var(--ink);color:var(--chalk);}
  .paste-pick-btn{
    width:100%;font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);
    background:var(--plaster-2);border:none;border-radius:4px;padding:11px 16px;
    cursor:pointer;text-align:left;
  }
  .paste-pick-btn:hover{background:var(--brass-light);}
  .hint{
    font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(234,227,214,0.35);
    margin-top:6px;
  }

  .empty-state{
    border:1px dashed var(--line);border-radius:4px;padding:60px 24px;text-align:center;
    color:var(--plaster-2);margin-top:24px;
  }
  .empty-state h3{font-family:'Fraunces',serif;color:var(--chalk);font-size:22px;margin:0 0 10px;}
  .empty-state p{font-size:14px;max-width:360px;margin:0 auto;}

  /* ---------- Studio badge ---------- */
  .studio-badge{
    display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;
    font-size:11px;letter-spacing:0.06em;color:var(--verdigris);border:1px solid rgba(91,138,130,0.4);
    padding:6px 12px;border-radius:999px;margin-bottom:18px;text-transform:uppercase;
  }
  .studio-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--verdigris);}

  /* ---------- Desk (admin) ---------- */
  .desk-toolbar{display:flex;justify-content:space-between;align-items:center;margin:28px 0 20px;}
  .btn{
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.03em;
    border:1px solid var(--brass);color:var(--brass-light);background:transparent;
    padding:9px 16px;border-radius:4px;cursor:pointer;transition:all .2s;
  }
  .btn:hover{background:var(--brass);color:var(--ink);}
  .btn.primary{background:var(--brass-light);color:var(--ink);border-color:var(--brass-light);}
  .btn.primary:hover{background:var(--chalk);}
  .btn.danger{border-color:var(--danger);color:var(--danger);}
  .btn.danger:hover{background:var(--danger);color:var(--chalk);}
  .btn.small{padding:6px 12px;font-size:11px;}

  .item-row{
    border:1px solid var(--line);border-radius:4px;padding:20px;margin-bottom:14px;
    background:var(--ink-2);position:relative;transition:opacity .2s;
  }
  .row-order-btns{
    position:absolute;top:12px;right:12px;
    display:flex;flex-direction:row;gap:4px;
  }
  .order-btn{
    background:none;border:1px solid var(--line);color:var(--plaster-2);
    width:28px;height:28px;border-radius:3px;font-size:12px;
    display:flex;align-items:center;justify-content:center;padding:0;
    transition:all .15s;
  }
  .order-btn:hover:not(:disabled){border-color:var(--brass-light);color:var(--brass-light);}
  .order-btn:disabled{opacity:0.2;}
  .drag-handle{
    position:absolute;left:0;top:0;bottom:0;width:36px;
    display:flex;align-items:center;justify-content:center;
    color:var(--plaster-2);font-size:18px;letter-spacing:2px;
    border-right:1px solid var(--line);
    transition:color .15s, background .15s;
  }
  .drag-handle:hover{color:var(--brass-light);background:rgba(176,141,87,0.06);}
  .item-row{
    border:1px solid var(--line);border-radius:4px;padding:20px 20px 20px 48px;margin-bottom:14px;
    background:var(--ink-2);position:relative;transition:opacity .2s, transform .15s;
  }
  .item-row.drag-over{border-color:var(--brass-light);background:rgba(176,141,87,0.05);}
  .item-row.dragging{opacity:0.4;transform:scale(0.98);}
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px;}
  .field-grid.full{grid-template-columns:1fr;}
  .field-grid-img{grid-template-columns:130px 1fr;}
  .img-uploader{
    aspect-ratio:1/1;border-radius:4px;border:1px dashed var(--line);cursor:pointer;
    display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;
    background-color:var(--ink-3);outline:none;
  }
  .img-uploader:focus{border-color:var(--brass-light);}
  .img-uploader-hint{
    font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--plaster-2);line-height:1.6;padding:8px;
  }
  label{
    display:block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.06em;
    color:var(--plaster-2);text-transform:uppercase;margin-bottom:6px;
  }
  input[type=text],textarea{
    width:100%;background:var(--ink);border:1px solid var(--line);color:var(--chalk);
    padding:10px 12px;border-radius:3px;font-family:'Inter',sans-serif;font-size:14px;
  }
  input[type=text]:focus,textarea:focus{outline:none;border-color:var(--brass-light);}
  textarea{resize:vertical;min-height:64px;}
  .row-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}

  .toggle{display:flex;align-items:center;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;}
  .switch{position:relative;width:40px;height:22px;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{
    position:absolute;cursor:pointer;inset:0;background:var(--ink-3);border:1px solid var(--line);
    border-radius:999px;transition:.2s;
  }
  .slider:before{
    content:"";position:absolute;height:14px;width:14px;left:3px;top:3px;background:var(--plaster-2);
    border-radius:50%;transition:.2s;
  }
  input:checked + .slider{background:rgba(176,141,87,0.35);border-color:var(--brass);}
  input:checked + .slider:before{transform:translateX(18px);background:var(--brass-light);}

  .row-actions{display:flex;gap:8px;}

  /* ---------- Modal ---------- */
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(10,9,13,0.72);display:flex;align-items:center;justify-content:center;
    z-index:50;padding:24px;
  }
  .modal{
    background:var(--ink-2);border:1px solid var(--line);border-radius:6px;padding:36px 32px;
    max-width:380px;width:100%;text-align:center;
  }
  .modal h3{font-family:'Fraunces',serif;font-size:22px;margin:0 0 10px;}
  .modal p{font-size:13.5px;color:var(--plaster-2);line-height:1.6;margin:0 0 24px;}
  .gsi-holder{display:flex;justify-content:center;margin-bottom:14px;min-height:44px;}
  .modal .close{
    background:none;border:none;color:var(--plaster-2);font-family:'IBM Plex Mono',monospace;
    font-size:11px;cursor:pointer;text-decoration:underline;
  }
  .denied{color:var(--danger);font-family:'IBM Plex Mono',monospace;font-size:12px;margin-top:10px;}

  @media (max-width:640px){
    .field-grid{grid-template-columns:1fr;}
    .topbar{flex-wrap:wrap;gap:12px;}
  }
  @media (prefers-reduced-motion: reduce){
    .placard{transition:none;}
  }

  /* ---------- Hero animation ---------- */
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(18px);}
    to{opacity:1;transform:translateY(0);}
  }
  .hero-animate .eyebrow{ animation:fadeUp .5s ease both; animation-delay:.05s; }
  .hero-animate h1{ animation:fadeUp .6s ease both; animation-delay:.18s; }
  .hero-animate p{ animation:fadeUp .6s ease both; animation-delay:.32s; }
  .hero-animate .hero-stats{ animation:fadeUp .6s ease both; animation-delay:.44s; }

  /* ---------- Hero stats ---------- */
  .hero-stats{
    display:flex;gap:28px;margin-top:24px;flex-wrap:wrap;
  }
  .stat-item{display:flex;flex-direction:column;gap:2px;}
  .stat-num{
    font-family:'Fraunces',serif;font-size:28px;font-weight:600;color:var(--brass-light);
    line-height:1;
  }
  .stat-label{
    font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.1em;
    color:var(--plaster-2);text-transform:uppercase;
  }
  .visitor-count{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--plaster-2);
    margin-top:8px;letter-spacing:0.04em;
  }
  .visitor-count span{color:var(--brass-light);}

  /* ---------- Filter bar ---------- */
  .filter-bar{
    display:flex;gap:10px;align-items:center;flex-wrap:wrap;
    margin-bottom:24px;padding:16px 0;
    border-bottom:1px solid var(--line);
  }
  .search-input{
    flex:1;min-width:160px;max-width:280px;
    background:var(--ink-2);border:1px solid var(--line);color:var(--chalk);
    padding:8px 14px;border-radius:999px;font-family:'IBM Plex Mono',monospace;font-size:12px;
  }
  .search-input:focus{outline:none;border-color:var(--brass-light);}
  .search-input::placeholder{color:rgba(234,227,214,0.3);}
  .tag-filter-btn{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.04em;
    background:transparent;border:1px solid var(--line);color:var(--plaster-2);
    padding:6px 14px;border-radius:999px;cursor:pointer;transition:all .15s;white-space:nowrap;
  }
  .tag-filter-btn:hover{border-color:var(--brass-light);color:var(--brass-light);}
  .tag-filter-btn.active{background:var(--brass-light);color:var(--ink);border-color:var(--brass-light);}
  .view-toggle{
    display:flex;gap:4px;margin-left:auto;
  }
  .view-toggle-btn{
    background:transparent;border:1px solid var(--line);color:var(--plaster-2);
    width:32px;height:32px;border-radius:4px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;
  }
  .view-toggle-btn.active{background:var(--brass-light);color:var(--ink);border-color:var(--brass-light);}

  /* ---------- List mode ---------- */
  .gallery-list{display:flex;flex-direction:column;gap:12px;margin-top:8px;}
  .list-item{
    border:1px solid var(--line);border-radius:4px;background:var(--ink-2);
    display:flex;align-items:center;gap:16px;padding:14px 18px;cursor:pointer;
    transition:border-color .2s;
  }
  .list-item:hover{border-color:var(--brass-light);}
  .list-thumb{
    width:48px;height:48px;border-radius:3px;flex-shrink:0;
    background-size:cover;background-position:center;
  }
  .list-info{flex:1;min-width:0;}
  .list-title{font-family:'Fraunces',serif;font-size:16px;color:var(--chalk);margin:0 0 2px;}
  .list-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--brass-light);letter-spacing:0.06em;text-transform:uppercase;}
  .list-desc{font-size:13px;color:var(--plaster-2);margin:4px 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .list-open{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--brass-light);
    text-decoration:none;white-space:nowrap;
  }
  .list-status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .list-status-dot.public{background:var(--brass-light);}
  .list-status-dot.private{background:var(--verdigris);}

  /* ---------- 3D hover ---------- */
  .frame-outer{perspective:1200px;transform-style:preserve-3d;}
  .frame{transition:transform .12s ease, box-shadow .12s ease;}
  .frame:hover{box-shadow:0 24px 48px -16px rgba(0,0,0,0.7);}

  /* ---------- Art hover hint ---------- */
  .art-hover-hint{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;
    color:var(--chalk);background:rgba(22,21,28,0.75);
    padding:8px 16px;border-radius:999px;border:1px solid rgba(176,141,87,0.4);
    opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;
  }
  .frame-outer:hover .art-hover-hint{opacity:1;}
  .no-results{
    text-align:center;padding:60px 24px;color:var(--plaster-2);
    font-family:'Fraunces',serif;font-size:20px;
  }

  /* ---------- Gallery filter animation ---------- */
  @keyframes galleryFade{
    from{opacity:0;transform:translateY(8px);}
    to{opacity:1;transform:translateY(0);}
  }
  #galleryContainer{animation:galleryFade .25s ease both;}

  /* ---------- Stagger card animation ---------- */
  @keyframes cardIn{
    from{opacity:0;transform:translateY(20px);}

<script>
const ADMIN_EMAIL = "gansuidou1@gmail.com";

const firebaseConfig = {

};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

let state = {
  view: 'public',
  items: [],
  loaded: false,
  authEmail: null,
  authName: null,
  authPicture: null,
  deniedEmail: null,
  showLoginModal: false,
  flippedId: null,
  editingId: null,
  showAddForm: false,
  profile: null,
  filterTag: '',
  searchQuery: '',
  listMode: false,
  visitorCount: 0,
  lightMode: false,
  detailItemId: null,
};

/* ---------------- data (Firestore) ---------------- */
async function refreshItems(){
  try{
    let snapshot;
    if(isAdmin()){
      snapshot = await db.collection('items').get();
    }else{
      snapshot = await db.collection('items').where('visibility','==','public').get();
    }
    state.items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    state.items.sort((a,b) => {
      const ao = (a.order === undefined || a.order === null) ? Infinity : a.order;
      const bo = (b.order === undefined || b.order === null) ? Infinity : b.order;
      if(ao !== bo) return ao - bo;
      return (b.createdAt||0) - (a.createdAt||0);
    });
  }catch(e){
    console.error(e);
    state.items = [];
  }
  state.loaded = true;
}
async function loadProfile(){
  try{
    const doc = await db.collection('meta').doc('profile').get();
    state.profile = doc.exists ? doc.data() : {
      name:'', nameEn:'', role:'', roleEn:'', bio:'', siteUrl:'', links:[]
    };
  }catch(e){
    state.profile = { name:'', nameEn:'', role:'', roleEn:'', bio:'', siteUrl:'', links:[] };
  }
}
async function saveProfile(data){
  await db.collection('meta').doc('profile').set(data);
  state.profile = data;
}

/* ---------------- visitor counter ---------------- */
async function incrementVisitor(){
  try{
    await db.collection('meta').doc('visitors').set(
      { count: firebase.firestore.FieldValue.increment(1) },
      { merge: true }
    );
  }catch(e){}
}
async function loadVisitorCount(){
  try{
    const doc = await db.collection('meta').doc('visitors').get();
    state.visitorCount = doc.exists ? (doc.data().count || 0) : 0;
  }catch(e){ state.visitorCount = 0; }
}

/* ---------------- filter / search helpers ---------------- */
function getFilteredItems(items){
  let result = items;
  if(state.filterTag){
    result = result.filter(i => (i.tags||'').toLowerCase().includes(state.filterTag.toLowerCase()));
  }
  if(state.searchQuery){
    const q = state.searchQuery.toLowerCase();
    result = result.filter(i =>
      (i.title||'').toLowerCase().includes(q) ||
      (i.description||'').toLowerCase().includes(q) ||
      (i.tags||'').toLowerCase().includes(q)
    );
  }
  return result;
}
function getAllTags(items){
  const tags = new Set();
  items.forEach(i => { if(i.tags) i.tags.split(/[,、\s]+/).forEach(t => { if(t) tags.add(t.trim()); }); });
  return [...tags];
}
async function maybeSeed(){
  if(!isAdmin()) return;
  try{
    const metaDoc = await db.collection('meta').doc('seed').get();
    if(metaDoc.exists) return;
    const snap = await db.collection('items').get();
    if(snap.empty){
      await db.collection('items').add({
        title: 'サンプル作品A', url: 'https://example.com',
        description: 'ここに作品の説明を書きます。編集ページから内容を書き換えたり削除したりできます。',
        tags: 'Web App', visibility: 'public', createdAt: Date.now(), order: 0
      });
      await db.collection('items').add({
        title: '非公開の下書き', url: 'https://example.com',
        description: '公開範囲を「非公開」にすると、あなたのみ閲覧できます。',
        tags: 'Prototype', visibility: 'private', createdAt: Date.now()+1, order: 1
      });
    }
    await db.collection('meta').doc('seed').set({ done: true });
  }catch(e){ console.error(e); }
}

/* ---------------- auth (Firebase) ---------------- */
function requestSignIn(){
  // signInWithPopupはタップイベントの同期コンテキストで呼ぶ必要がある（スマホのポップアップブロック対策）
  auth.signInWithPopup(provider).then(async (result) => {
    const email = result.user.email;
    if(email === ADMIN_EMAIL){
      state.authEmail = email;
      state.authName = result.user.displayName;
      state.authPicture = result.user.photoURL;
      state.deniedEmail = null;
      state.showLoginModal = false;
      await maybeSeed();
      await refreshItems();
      await loadProfile();
      render();
    }else{
      state.deniedEmail = email + ' ではアクセスできません';
      auth.signOut();
      render();
    }
  }).catch((err) => {
    console.error('popup error:', err.code, err.message);
    state.deniedEmail = 'エラー: ' + err.code;
    render();
  });
}
function logout(){
  auth.signOut();
  state.authEmail = null;
  state.authName = null;
  state.authPicture = null;
  refreshItems().then(() => goTo('public'));
}
function isAdmin(){ return state.authEmail === ADMIN_EMAIL; }

auth.onAuthStateChanged(async (user) => {
  if(user && user.email === ADMIN_EMAIL){
    state.authEmail = user.email;
    state.authName = user.displayName;
    state.authPicture = user.photoURL;
    await maybeSeed();
    await refreshItems();
    await loadProfile();
    render();
  }
});

/* ---------------- navigation (hash router) ---------------- */
const VIEW_MAP = { '': 'public', 'public': 'public', 'profile': 'profile', 'studio': 'studio', 'desk': 'desk' };

function parseHash(){
  const hash = location.hash.replace('#', '');
  if(hash.startsWith('detail/')){
    return { view: 'detail', id: hash.replace('detail/', '') };
  }
  return { view: VIEW_MAP[hash] || 'public', id: null };
}

function pushHash(view, id = null){
  const h = view === 'detail' ? `detail/${id}` : (view === 'public' ? '' : view);
  if(location.hash.replace('#','') !== h){
    history.pushState({ view, id }, '', h ? `#${h}` : location.pathname + location.search);
  }
}

function goTo(view){
  if((view === 'studio' || view === 'desk') && !isAdmin()){
    state.showLoginModal = true;
    render();
    return;
  }
  state.view = view;
  state.detailItemId = null;
  state.showAddForm = false;
  state.editingId = null;
  state.filterTag = '';
  state.searchQuery = '';
  pushHash(view);
  window.scrollTo(0, 0);
  render();
}

function goToDetail(id){
  state.detailItemId = id;
  state.view = 'detail';
  pushHash('detail', id);
  window.scrollTo(0, 0);
  render();
}

window.addEventListener('popstate', () => {
  const { view, id } = parseHash();
  if(view === 'detail' && id){
    state.detailItemId = id;
    state.view = 'detail';
  }else{
    state.view = view;
    state.detailItemId = null;
  }
  render();
});

function closeModal(){
  state.showLoginModal = false;
  state.deniedEmail = null;
  render();
}

/* ---------------- QR modal ---------------- */
function showQR(url, title){
  const existing = document.getElementById('qrModalOverlay');
  if(existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'qrModalOverlay';
  overlay.className = 'qr-modal';
  overlay.innerHTML = `
    <div class="qr-card">
      <p class="qr-card-title">${escapeHtml(title)}</p>
      <p class="qr-card-url">${escapeHtml(url)}</p>
      <div id="qrcode-holder"></div>
      <div style="display:flex;justify-content:center;gap:8px;">
        <button class="qr-dl" onclick="downloadQR('${escapeHtml(title)}')">保存</button>
        <button class="qr-close" onclick="closeQR()">閉じる</button>
      </div>
    </div>
  `;
  overlay.addEventListener('click', (e)=>{ if(e.target === overlay) closeQR(); });
  document.body.appendChild(overlay);

  // Render QR code after DOM is ready
  requestAnimationFrame(()=>{
    const holder = document.getElementById('qrcode-holder');
    if(!holder) return;
    new QRCode(holder, {
      text: url,
      width: 200,
      height: 200,
      colorDark: '#16151C',
      colorLight: '#F3EFE6',
      correctLevel: QRCode.CorrectLevel.M
    });
  });
}
function closeQR(){
  const el = document.getElementById('qrModalOverlay');
  if(el) el.remove();
}
function downloadQR(title){
  const holder = document.getElementById('qrcode-holder');
  if(!holder) return;
  const canvas = holder.querySelector('canvas');
  if(!canvas){ alert('QRコードの読み込み中です。少し待ってからお試しください。'); return; }
  const link = document.createElement('a');
  link.download = `qr-${title.replace(/[^a-zA-Z0-9ぁ-んァ-ン一-龥]/g,'_')}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

/* ---------------- rendering helpers ---------------- */
const HUE_PALETTES = [[220,42],[175,44],[258,32],[198,168]];
function hashCode(str){
  let h = 0;
  for(let i=0;i<str.length;i++){ h = str.charCodeAt(i) + ((h<<5)-h); h |= 0; }
  return Math.abs(h);
}
function frameBg(title){
  const h = hashCode(title || 'untitled');
  const pal = HUE_PALETTES[h % HUE_PALETTES.length];
  const angle = h % 360;
  const pos = 25 + (h % 45);
  return `conic-gradient(from ${angle}deg at ${pos}% ${pos}%, hsl(${pal[0]} 30% 16%), hsl(${pal[1]} 26% 11%), hsl(${pal[0]} 28% 14%))`;
}
function escapeHtml(s){
  const d = document.createElement('div');
  d.innerText = s || '';
  return d.innerHTML;
}

/* フィルターバーにイベントを確実に登録する（onclick文字列ではなくaddEventListener） */
function attachFilterBarEvents(){
  const searchInput = document.getElementById('filterSearchInput');
  if(searchInput && !searchInput._attached){
    searchInput._attached = true;
    searchInput.addEventListener('input', e => onSearchInput(e.target.value));
  }

  document.querySelectorAll('.tag-filter-btn').forEach(btn => {
    if(btn._attached) return;
    btn._attached = true;
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const tag = btn.dataset.tag;
      state.filterTag = state.filterTag === tag ? '' : tag;
      updateFilterBarUI();
      const isPublic = state.view === 'public';
      const items = isPublic ? state.items.filter(i=>i.visibility==='public') : [...state.items];
      renderGalleryOnly(items, !isPublic);
    });
  });

  const gridBtn = document.getElementById('viewModeGrid');
  const listBtn = document.getElementById('viewModeList');
  if(gridBtn && !gridBtn._attached){
    gridBtn._attached = true;
    gridBtn.addEventListener('click', () => {
      state.listMode = false;
      updateFilterBarUI();
      const isPublic = state.view === 'public';
      const items = isPublic ? state.items.filter(i=>i.visibility==='public') : [...state.items];
      renderGalleryOnly(items, !isPublic);
    });
  }
  if(listBtn && !listBtn._attached){
    listBtn._attached = true;
    listBtn.addEventListener('click', () => {
      state.listMode = true;
      updateFilterBarUI();
      const isPublic = state.view === 'public';
      const items = isPublic ? state.items.filter(i=>i.visibility==='public') : [...state.items];
      renderGalleryOnly(items, !isPublic);
    });
  }
}

/* フィルターバーのactive状態だけ更新 */
function updateFilterBarUI(){
  document.querySelectorAll('.tag-filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tag === state.filterTag);
  });
  const gridBtn = document.getElementById('viewModeGrid');
  const listBtn = document.getElementById('viewModeList');
  if(gridBtn) gridBtn.classList.toggle('active', !state.listMode);
  if(listBtn) listBtn.classList.toggle('active', state.listMode);
}

/* setFilter/setListModeはstateだけ変えてattachFilterBarEventsに委譲 */
function setFilter(tag){
  state.filterTag = state.filterTag === tag ? '' : tag;
  updateFilterBarUI();
  const isPublic = state.view === 'public';
  const items = isPublic ? state.items.filter(i=>i.visibility==='public') : [...state.items];
  renderGalleryOnly(items, !isPublic);
}
function setListMode(v){
  state.listMode = v;
  updateFilterBarUI();
  const isPublic = state.view === 'public';
  const items = isPublic ? state.items.filter(i=>i.visibility==='public') : [...state.items];
  renderGalleryOnly(items, !isPublic);
}

/* カードグリッドだけ更新 */
function renderGalleryOnly(items, showStatus){
  const container = document.getElementById('galleryContainer');
  if(!container) return;
  // Reset animation
  container.style.animation = 'none';
  container.offsetHeight; // reflow
  container.style.animation = '';
  const filtered = getFilteredItems(items);
  if(filtered.length === 0){
    container.innerHTML = `<div class="no-results">該当する作品がありません。</div>`;
    return;
  }
  container.innerHTML = state.listMode
    ? `<div class="gallery-list">${filtered.map(i=>renderListItem(i,showStatus)).join('')}</div>`
    : `<div class="gallery">${filtered.map(i=>renderCard(i,showStatus)).join('')}</div>`;
  requestAnimationFrame(attach3DHover);
}

let _searchTimer = null;
function onSearchInput(q){
  state.searchQuery = q;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(()=>{
    const isPublic = state.view === 'public';
    const items = isPublic ? state.items.filter(i=>i.visibility==='public') : [...state.items];
    renderGalleryOnly(items, !isPublic);
  }, 180);
}

async function uploadImage(id, file){
  if(!file || file.type.indexOf('image') !== 0){
    alert('画像ファイルを選択してください。');
    return;
  }
  try{
    const base64 = await resizeToBase64(file, 800, 0.82);
    if(base64.length > 900000){
      alert('画像が大きすぎます。もう少し小さい画像を使ってください。');
      return;
    }
    await db.collection('items').doc(id).update({ imageUrl: base64 });
    await refreshItems();
    render();
  }catch(e){
    console.error(e);
    alert('画像の保存に失敗しました。');
  }
}
function resizeToBase64(file, maxPx, quality){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (ev) => {
      img.src = ev.target.result;
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > maxPx || h > maxPx){
          if(w > h){ h = Math.round(h * maxPx / w); w = maxPx; }
          else{ w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

  const file = e.target.files[0];

/* ---------------- desk drag & drop reorder ---------------- */
let _dragId = null;

function deskDragStart(e, id){
  _dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('dragging');
}
function deskDragOver(e, targetId){
  e.preventDefault();
  if(_dragId === targetId) return;
  document.querySelectorAll('.item-row').forEach(r => r.classList.remove('drag-over'));
  document.getElementById('row_' + targetId)?.classList.add('drag-over');
}
function deskDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
async function deskDrop(e, targetId){
  e.preventDefault();
  document.querySelectorAll('.item-row').forEach(r => r.classList.remove('drag-over','dragging'));
  if(!_dragId || _dragId === targetId){ _dragId = null; return; }
  const ids = state.items.map(i => i.id);
  const fromIdx = ids.indexOf(_dragId);
  const toIdx = ids.indexOf(targetId);
  if(fromIdx === -1 || toIdx === -1){ _dragId = null; return; }
  ids.splice(fromIdx, 1);
  ids.splice(toIdx, 0, _dragId);
  _dragId = null;
  try{
    const batch = db.batch();
    ids.forEach((itemId, i) => batch.update(db.collection('items').doc(itemId), { order: i }));
    await batch.commit();
  }catch(e){ alert('並び替えの保存に失敗しました。'); return; }
  await refreshItems();
  render();
}
function deskDragEnd(e){
  document.querySelectorAll('.item-row').forEach(r => r.classList.remove('drag-over','dragging'));
  _dragId = null;
}

/* ---------------- arrow-button reorder ---------------- */
async function moveItem(id, direction){
  const ids = state.items.map(i => i.id);
  const idx = ids.indexOf(id);
  const newIdx = idx + direction;
  if(newIdx < 0 || newIdx >= ids.length) return;
  ids.splice(idx, 1);
  ids.splice(newIdx, 0, id);
  try{
    const batch = db.batch();
    ids.forEach((itemId, i) => batch.update(db.collection('items').doc(itemId), { order: i }));
    await batch.commit();
  }catch(e){
    alert('並び替えの保存に失敗しました: ' + e.message);
    return;
  }
  await refreshItems();
  render();
}

    html = renderPublic();
  }
  c.innerHTML = `<div class="page-transition">${html}</div>`;
  if(state.view === 'profile') requestAnimationFrame(initCardQR);
  if(state.view === 'public' || state.view === 'studio'){
    requestAnimationFrame(() => {
      attach3DHover();
      attachFilterBarEvents();
    });
  }
  renderModal();
}

/* ---------------- 3D hover effect ---------------- */
function attach3DHover(){
  document.querySelectorAll('.frame').forEach(card => {
    if(card._3dAttached) return;
    card._3dAttached = true;
    card.addEventListener('mousemove', (e) => {
      const r = card.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width - 0.5;
      const y = (e.clientY - r.top) / r.height - 0.5;
      card.style.transform = `rotateY(${x * 10}deg) rotateX(${-y * 8}deg) scale(1.02)`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = '';
    });
  });
}

/* ---------------- custom cursor ---------------- */
function initCursor(){
  const dot = document.getElementById('customCursor');
  const ring = document.getElementById('customCursorRing');
  if(!dot || !ring) return;
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    dot.style.left = mx + 'px';
    dot.style.top = my + 'px';
  });
  function animateRing(){
    rx += (mx - rx) * 0.14;
    ry += (my - ry) * 0.14;
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
    requestAnimationFrame(animateRing);
  }
  animateRing();
  document.querySelectorAll('a,button,.frame,.placard,.list-item').forEach(el => {
    el.addEventListener('mouseenter', () => { dot.classList.add('hovering'); ring.classList.add('hovering'); });
    el.addEventListener('mouseleave', () => { dot.classList.remove('hovering'); ring.classList.remove('hovering'); });
  });
}

/* ---------------- particles ---------------- */
function initParticles(){
  const canvas = document.getElementById('particleCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for(let i = 0; i < 48; i++){
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.2 + 0.3,
      dx: (Math.random() - 0.5) * 0.18,
      dy: (Math.random() - 0.5) * 0.18,
      o: Math.random() * 0.4 + 0.1
    });
  }
  function draw(){
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(176,141,87,${p.o})`;
      ctx.fill();
      p.x += p.dx; p.y += p.dy;
      if(p.x < 0) p.x = W;
      if(p.x > W) p.x = 0;
      if(p.y < 0) p.y = H;
      if(p.y > H) p.y = 0;
    });
    requestAnimationFrame(draw);
  }
  draw();
}

/* ---------------- parallax ---------------- */
function initParallax(){
  window.addEventListener('scroll', () => {
    const hero = document.querySelector('.parallax-hero');
    if(hero) hero.style.transform = `translateY(${window.scrollY * 0.25}px)`;
  }, { passive: true });
}

(async function init(){
  // Restore light mode preference
  if(localStorage.getItem('lightMode') === '1'){
    state.lightMode = true;
    document.body.classList.add('light-mode');
  }
  // Parse initial hash for deep-linking
  const { view, id } = parseHash();
  if(view === 'detail' && id){
    state.detailItemId = id;
    state.view = 'detail';
  }else if(view){
    state.view = view;
  }
  render();
  await Promise.all([refreshItems(), loadProfile(), loadVisitorCount()]);
  render();
  if(!sessionStorage.getItem('visited')){
    sessionStorage.setItem('visited','1');
    incrementVisitor();
    state.visitorCount++;
  }
  attach3DHover();
  initCursor();
  initParticles();
  initParallax();
})();
</script>
